<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>RAG知识库助手</title>

    <style>
        body{ margin:0; background:#f5f5f5; font-family:Arial; }
        #app{ width:900px; margin:30px auto; }
        h2{ text-align:center; }
        .chat{ background:white; border-radius:10px; height:600px; overflow-y:auto; padding:20px; box-shadow:0 0 10px rgba(0,0,0,.1); }
        .msg{ margin:15px 0; }
        .user{ color:#1565c0; font-weight:bold; }
        .assistant{ color:#2e7d32; white-space:pre-wrap; }
        .bottom{ display:flex; margin-top:20px; gap:10px; }
        input{ flex:1; padding:12px; font-size:16px; }
        button{ width:120px; font-size:16px; cursor:pointer; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>

</head>

<body>

<div id="app">
    <h2>RAG知识库助手</h2>
    <div class="chat">
        <div v-for="item in messages" class="msg">
            <div class="user" v-if="item.role==='user'">用户：{{item.content}}</div>
            <div class="assistant" v-else>AI：{{item.content}}</div>
        </div>
    </div>

    <div class="bottom">
        <input v-model="question" @keyup.enter="sendMessage" placeholder="请输入问题..." :disabled="sending">
        <button @click="sendMessage" :disabled="sending">
            {{ sending ? '回答中...' : '发送' }}
        </button>
    </div>
</div>

<!-- ✅ 核心修改点 1：使用 type="module" 开启 ES 模块支持 -->
<script type="module">
    // ✅ 核心修改点 2：通过 ESM CDN (esm.sh) 直接 import Vue 和 微软的库
    // esm.sh 是一个神奇的 CDN，它能实时把 npm 包转换成浏览器能看懂的 ES Module
    import { createApp } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'
    import { fetchEventSource } from 'https://esm.sh/@microsoft/fetch-event-source@2.0.1'

    createApp({
        data() {
            return {
                question: "",
                messages: [],
                sending: false,
                ctrl: null
            }
        },
        methods: {
            scrollBottom() {
                this.$nextTick(() => {
                    const chat = document.querySelector(".chat")
                    if (chat) chat.scrollTop = chat.scrollHeight
                })
            },
            async sendMessage() {
                if (this.sending) return
                if (!this.question.trim()) return

                const query = this.question.trim()
                this.messages.push({ role: "user", content: query })
                this.question = ""

                const aiMessage = { role: "assistant", content: "" }
                this.messages.push(aiMessage)
                const aiIndex = this.messages.length - 1

                this.scrollBottom()
                this.sending = true
                this.ctrl = new AbortController()

                try {
                    // ✅ 现在 fetchEventSource 已经成功 import 进来了，可以直接使用！
                    await fetchEventSource("/api/stream", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ query }),
                        signal: this.ctrl.signal,
                        
                        onmessage: (ev) => {
                            if (ev.data === "[DONE]") {
                                this.ctrl.abort() // 收到结束信号，主动断开，防止库自动重连
                                return
                            }
                            try {
                                const parsed = JSON.parse(ev.data)
                                if (parsed.content) {
                                    this.messages[aiIndex].content += parsed.content
                                    this.scrollBottom()
                                }
                            } catch (e) {
                                console.error("JSON 解析错误:", e)
                            }
                        },
                        onerror: (err) => {
                            console.error("SSE 连接出错:", err)
                            this.messages[aiIndex].content += "\n\n[网络异常，连接中断]"
                            throw err // 抛出错误，阻止库的无限自动重连
                        },
                        openWhenHidden: true, // 防止切换标签页时连接被挂起
                    })
                } catch (e) {
                    if (e.name !== 'AbortError') {
                        this.messages[aiIndex].content = "发生错误：" + e
                    }
                } finally {
                    this.sending = false
                    this.ctrl = null
                }
            }
        }
    }).mount("#app")
</script>

</body>
</html>
