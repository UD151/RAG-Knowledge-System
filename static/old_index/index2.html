<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>RAG知识库助手</title>
    
    <!-- 【关键修改1】引入 Vue 3 的库 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <style>
        body{ margin:0; background:#f5f5f5; font-family:Arial, sans-serif; }
        /* 简单的滚动条样式优化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    </style>
</head>

<body>

<!-- Vue 挂载点 -->
<div id="app" style="display: flex; height: 100vh; font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5;">
    
    <!-- 左侧：会话列表侧边栏 -->
    <div style="width: 260px; background: #202123; color: white; padding: 15px; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.1);">
        <button @click="createSession" style="padding: 12px; margin-bottom: 20px; cursor: pointer; background: #10a37f; color: white; border: none; border-radius: 6px; font-size: 14px; text-align: left; display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 18px;">+</span> 新建对话
        </button>
        
        <div style="flex: 1; overflow-y: auto;">
            <div v-for="sess in sessions" :key="sess.id" 
                 @click="loadSession(sess.id)" 
                 :style="{
                     padding: '12px', 
                     marginBottom: '8px', 
                     background: currentSessionId === sess.id ? '#343541' : 'transparent', 
                     borderRadius: '6px', 
                     cursor: 'pointer',
                     whiteSpace: 'nowrap',
                     overflow: 'hidden',
                     textOverflow: 'ellipsis',
                     transition: 'background 0.2s'
                 }">
                💬 {{ sess.summary || '新对话' }}
            </div>
            
            <div v-if="sessions.length === 0" style="text-align: center; color: #888; margin-top: 20px; font-size: 13px;">
                暂无历史记录
            </div>
        </div>
    </div>

    <!-- 右侧：聊天主界面 -->
    <div style="flex: 1; display: flex; flex-direction: column; background: white;">
        
        <!-- 顶部导航栏 -->
        <div style="padding: 15px 20px; border-bottom: 1px solid #e5e5e5; font-size: 16px; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
            <span>RAG 知识库问答助手</span>
            <span v-if="currentSessionId" style="font-size: 12px; color: #888; font-weight: normal;">ID: {{ currentSessionId.slice(0,8) }}...</span>
        </div>

        <!-- 消息展示区 -->
        <div style="flex: 1; overflow-y: auto; padding: 20px;" ref="chatContainer">
            
            <!-- 欢迎语 (当没有选中任何会话时显示) -->
            <div v-if="!currentSessionId" style="text-align: center; margin-top: 100px; color: #888;">
                <h2 style="font-size: 24px; margin-bottom: 10px;">👋 欢迎使用</h2>
                <p>请点击左侧的“新建对话”开始提问。</p>
            </div>

            <!-- 消息列表 -->
            <div v-for="(item, index) in messages" :key="index" style="margin-bottom: 20px; display: flex;" :style="{'justify-content': item.role === 'user' ? 'flex-end' : 'flex-start'}">
                <div style="max-width: 70%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; white-space: pre-wrap; word-break: break-all;"
                     :style="item.role === 'user' ? 'background: #e3f2fd; color: #000;' : 'background: #f5f5f5; color: #000;'">
                    <strong style="display: block; font-size: 12px; color: #666; margin-bottom: 5px;">
                        {{ item.role === 'user' ? '我' : 'AI 助手' }}
                    </strong>
                    {{ item.content }}
                </div>
            </div>
            
            <!-- 加载动画 -->
            <div v-if="sending" style="margin-bottom: 20px; display: flex; justify-content: flex-start;">
                <div style="background: #f5f5f5; padding: 12px 16px; border-radius: 8px; display: inline-block; color: #666;">
                    AI 正在思考中...
                </div>
            </div>
        </div>
        
        <!-- 底部输入区 -->
        <div style="padding: 15px 20px; border-top: 1px solid #e5e5e5; display: flex; background: #fff;">
            <input v-model="query" 
                   @keyup.enter="sendMessage" 
                   :disabled="!currentSessionId || sending"
                   :placeholder="currentSessionId ? (sending ? 'AI 正在生成...' : '请输入关于知识库的问题...') : '请先新建对话'" 
                   style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; transition: border-color 0.2s;"
                   :style="sending ? 'background: #f9f9f9;' : ''">
            
            <button @click="sendMessage" 
                    :disabled="sending || !currentSessionId || !query.trim()" 
                    style="margin-left: 10px; padding: 12px 24px; cursor: pointer; background: #10a37f; color: white; border: none; border-radius: 6px; font-size: 14px; min-width: 80px;">
                {{ sending ? '生成中...' : '发送' }}
            </button>
        </div>
    </div>
</div>

<script>
    // 【关键修改2】使用 Vue 3 的 API
    const { createApp, ref, nextTick } = Vue;

    createApp({
        setup() {
            // 定义响应式数据
            const query = ref('');
            const messages = ref([]);      
            const sessions = ref([]);      
            const currentSessionId = ref(null); 
            const sending = ref(false);
            const chatContainer = ref(null); // 用于获取 DOM 元素

            // 方法定义
            const loadSessions = async () => {
                try {
                    const res = await fetch('/api/sessions');
                    sessions.value = await res.json();
                    
                    // 如果当前没选中会话，且列表里有数据，默认加载最新的一条
                    if (sessions.value.length > 0 && !currentSessionId.value) {
                        loadSession(sessions.value[0].id);
                    }
                } catch (e) {
                    console.error("加载会话列表失败", e);
                }
            };

            const createSession = async () => {
                try {
                    const res = await fetch('/api/sessions', { method: 'POST' });
                    const data = await res.json();
                    currentSessionId.value = data.session_id;
                    messages.value = []; // 清空右侧聊天区
                    await loadSessions(); // 刷新左侧列表
                } catch (e) {
                    alert("新建对话失败");
                }
            };

            const loadSession = async (sessionId) => {
                currentSessionId.value = sessionId;
                try {
                    // 注意：这里假设后端有获取历史消息的接口
                    // 如果你的后端还没有这个接口，这里会报错，需要后端配合添加
                    const res = await fetch(`/api/sessions/${sessionId}/messages`);
                    if(res.ok) {
                        messages.value = await res.json();
                        scrollToBottom();
                    }
                } catch (e) {
                    console.warn("加载历史消息失败（可能是后端还没写好该接口）", e);
                    // 临时容错：如果接口不存在，暂时清空消息，避免页面卡死
                    messages.value = []; 
                }
            };

            const sendMessage = async () => {
                if (!query.value.trim() || sending.value || !currentSessionId.value) return;

                const userMsg = query.value;
                
                // 1. 界面先显示用户的提问
                messages.value.push({ role: 'user', content: userMsg });
                query.value = '';
                sending.value = true;
                scrollToBottom();

                // 2. 给 AI 添加一个空的消息占位符
                messages.value.push({ role: 'assistant', content: '' });
                const aiMsgIndex = messages.value.length - 1;

                try {
                    const response = await fetch('/api/stream', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            query: userMsg, 
                            session_id: currentSessionId.value 
                        }) 
                    });

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const text = decoder.decode(value);
                        const lines = text.split('\n');
                        
                        for (const line of lines) {
                            if (line.startsWith('data: ')) {
                                const data = line.substring(6);
                                if (data === '[DONE]') continue;
                                try {
                                    const parsed = JSON.parse(data);
                                    // 把流式返回的碎片拼接到占位符里
                                    messages.value[aiMsgIndex].content += parsed.content;
                                    scrollToBottom();
                                } catch (e) {}
                            }
                        }
                    }
                    // 3. 对话结束后，刷新左侧列表（更新标题和时间）
                    loadSessions(); 
                } catch (error) {
                    messages.value[aiMsgIndex].content = "❌ 请求出错，请检查后端服务。";
                } finally {
                    sending.value = false;
                }
            };

            const scrollToBottom = () => {
                nextTick(() => {
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                });
            };

            // 生命周期：挂载完成后加载列表
            // 在 Vue 3 setup 中通常不需要显式调用 mounted，直接在 script 尾部执行即可，或者用 onMounted
            // 为了简单起见，我们在下面手动调用一次
            loadSessions();

            // 暴露给模板使用
            return {
                query,
                messages,
                sessions,
                currentSessionId,
                sending,
                chatContainer,
                loadSessions,
                createSession,
                loadSession,
                sendMessage
            };
        }
    }).mount('#app');
</script>

</body>
</html>
